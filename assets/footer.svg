<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" preserveAspectRatio="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="50%" style="stop-color:#1A0A0A"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#DC143C;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#4A0E0E;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FF4444;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes wave1 {
      0%, 100% { d: path("M0,0 L0,50 C200,80 400,20 600,60 C800,100 1000,40 1200,70 L1200,0 Z"); }
      50% { d: path("M0,0 L0,60 C200,30 400,80 600,40 C800,60 1000,90 1200,50 L1200,0 Z"); }
    }
    @keyframes wave2 {
      0%, 100% { d: path("M0,0 L0,40 C300,70 500,20 700,55 C900,80 1100,30 1200,60 L1200,0 Z"); }
      50% { d: path("M0,0 L0,55 C300,25 500,70 700,35 C900,50 1100,75 1200,45 L1200,0 Z"); }
    }
    @keyframes wave3 {
      0%, 100% { d: path("M0,0 L0,30 C250,55 450,15 650,45 C850,70 1050,25 1200,50 L1200,0 Z"); }
      50% { d: path("M0,0 L0,45 C250,20 450,60 650,30 C850,45 1050,65 1200,35 L1200,0 Z"); }
    }
    .wave1 { animation: wave1 8s ease-in-out infinite; }
    .wave2 { animation: wave2 6s ease-in-out infinite; }
    .wave3 { animation: wave3 10s ease-in-out infinite; }
  </style>
  
  <rect width="1200" height="150" fill="url(#bg)"/>
  
  <path class="wave1" d="M0,0 L0,50 C200,80 400,20 600,60 C800,100 1000,40 1200,70 L1200,0 Z" fill="url(#wave1)"/>
  <path class="wave2" d="M0,0 L0,40 C300,70 500,20 700,55 C900,80 1100,30 1200,60 L1200,0 Z" fill="url(#wave2)"/>
  <path class="wave3" d="M0,0 L0,30 C250,55 450,15 650,45 C850,70 1050,25 1200,50 L1200,0 Z" fill="#0D1117" opacity="0.7"/>
  
  <text x="600" y="110" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#FF666688">"Hacking Dont Need Agreements"</text>
  <text x="600" y="135" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#FF444466">— Hacking Dream</text>
</svg>
