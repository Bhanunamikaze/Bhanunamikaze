<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 4" preserveAspectRatio="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#FF000066"/>
      <stop offset="50%" style="stop-color:#FF0000"/>
      <stop offset="80%" style="stop-color:#FF000066"/>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes glow { 0%,100%{opacity:0.6} 50%{opacity:1} }
    .line{animation:glow 3s ease-in-out infinite}
  </style>
  <rect class="line" width="1200" height="2" y="1" fill="url(#g)" rx="1"/>
</svg>
